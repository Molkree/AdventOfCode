default_language_version:
  python: python3.14

auto_update:
  cooldown_days: 7

exclude: input

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: 3e8a8703264a2f4a69428a0aa4dcb512790b2c8c  # frozen: v6.0.0
    hooks:
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: debug-statements
      - id: end-of-file-fixer
      - id: requirements-txt-fixer
      - id: trailing-whitespace

  - repo: https://github.com/pycqa/isort
    rev: a333737ed43df02b18e6c95477ea1b285b3de15a  # frozen: 8.0.1
    hooks:
      - id: isort
        args: ["--profile", "black"]

  - repo: https://github.com/psf/black-pre-commit-mirror
    rev: 4160603246a6b365d4a2af661c6d71b0a0f50478  # frozen: 26.5.1
    hooks:
      - id: black

  - repo: https://github.com/asottile/pyupgrade
    rev: 75992aaa40730136014f34227e0135f63fc951b4  # frozen: v3.21.2
    hooks:
      - id: pyupgrade
        args: ["--py314-plus"]

  - repo: https://github.com/PyCQA/autoflake
    rev: 988e469555a54b0b16e39faf16ae84ff247fd337  # frozen: v2.3.3
    hooks:
      - id: autoflake
        args:
          - --in-place
          - --remove-unused-variables
          - --remove-all-unused-imports

  - repo: https://github.com/pycqa/flake8
    rev: c48217e1fc006c2dddd14df54e83b67da15de5cd  # frozen: 7.3.0
    hooks:
      - id: flake8
        additional_dependencies: [pep8-naming==0.15.1]
        language: python

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: d2823d321df3af8f878f7ee3414dc94d037145b9  # frozen: v2.1.0
    hooks:
      - id: mypy
        name: mypy 2020
        args: ["--strict"]
        files: ^2020
      - id: mypy
        name: mypy 2021
        args: ["--strict"]
        files: ^2021
      - id: mypy
        name: mypy 2022
        args: ["--strict"]
        files: ^2022
      - id: mypy
        name: mypy 2024
        args: ["--strict"]
        files: ^2024

  - repo: https://github.com/astral-sh/uv-pre-commit
    rev: 84ed656d5ada0b07830b74fb0fe18b3bc1029441 # frozen: 0.11.26
    hooks:
      - id: uv-lock
